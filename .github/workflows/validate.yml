---
name: Ansible lint
on:
  push:
    branches:
      - 'main'
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - 'main'
      - 'feature/**'
      - 'fix/**'
  workflow_dispatch:

jobs:
  yaml-lint:
    name: Lint yaml files
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-yaml-lint.yaml@golang-1.24.0
    with:
      runs-on: dagger-labda
      environment-name: k8s
      continue-error: true
      yamllint-version: 1
      lintprofile-path: .yamllint
      artifact-name: yaml-lint

  ansible-lint:
    name: Lint ansible code
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-ansible-lint.yaml@golang-1.24.0
    with:
      runs-on: dagger-labda
      environment-name: k8s
      continue-error: true
      # ghcr, not eu.gcr.io: the Google Artifact Registry copy answers
      # "Unauthenticated request" to every runner, so the job container never
      # started and ansible-lint silently did not run — masked by
      # continue-error below. 14.0.0 rather than a 10.3.0 equivalent because
      # ghcr only carries the 14.x line, which is what the fleet runs today.
      ansible-image: ghcr.io/stuttgart-things/sthings-ansible:14.0.0
      playbook: tests/test.yml
    needs: yaml-lint

  molecule-test:
    name: Test ansible code w/ molecule
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-moluecule-test.yaml@golang-1.24.0
    with:
      runs-on: dagger-labda
      environment-name: k8s
      scenario-names: "['default']"
    # needs: ansible-lint
